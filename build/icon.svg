<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!--
    Side app icon. Inset by ~100px on every side to follow Apple's macOS
    icon padding convention so the dock doesn't render a white halo around it.
    The dark rounded square uses a paper-tone gradient; the serif italic S is
    drawn as a single path so the icon is identical without Source Serif loaded.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2622" />
      <stop offset="100%" stop-color="#16130f" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" />
      <feOffset dx="0" dy="6" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.25" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Squircle body (824×824, inset 100 on all sides). Radius ≈ 22% of the
       inner dimension matches Apple's modern app-icon corner. -->
  <g filter="url(#shadow)">
    <rect x="100" y="100" width="824" height="824" rx="180" fill="url(#bg)" />
    <!-- Subtle inner highlight -->
    <rect x="106" y="106" width="812" height="812" rx="174"
          fill="none" stroke="rgba(247,243,236,0.06)" stroke-width="2" />
  </g>

  <!-- Italic serif "S" centred at (512, 540), height ≈ 540. -->
  <path
    fill="#f7f3ec"
    d="M 706 332
       C 686 286, 626 252, 548 252
       C 428 252, 348 320, 348 412
       C 348 488, 410 530, 510 562
       L 568 580
       C 632 600, 678 626, 678 678
       C 678 736, 614 776, 528 776
       C 442 776, 376 740, 342 678
       L 314 686
       C 332 748, 396 800, 492 810
       L 470 850
       L 514 850
       L 538 810
       C 644 800, 720 728, 720 642
       C 720 562, 646 522, 552 490
       L 498 472
       C 436 452, 396 426, 396 380
       C 396 332, 450 296, 524 296
       C 606 296, 660 326, 686 384
       L 718 376
       C 712 360, 710 346, 706 332
       Z" />
</svg>
